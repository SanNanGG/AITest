<!DOCTYPE html>
<html>
<head>
    <title>AI学習テスト</title>
    <!-- 読み込み元をGoogle公式の安定版に変更 -->
    <script src="https://ajax.googleapis.com"></script>
</head>
<body style="font-family: sans-serif; padding: 20px;">
    <h1>AI数値学習シミュレーター</h1>
    
    <p>1. AIに「2倍の法則」を学習させます。</p>
    <button id="startBtn" onclick="learn()">学習開始</button>
    <span id="status">未学習</span>

    <hr>

    <p>2. 好きな数字を入れてテスト！</p>
    <input type="number" id="userNumber" value="10">
    <button id="predictBtn" onclick="predict()">AIに予測させる</button>

    <h2 id="result"></h2>

    <script>
        // TensorFlow.jsが正しく読み込まれたかチェック
        window.onload = function() {
            if (typeof tf === 'undefined') {
                document.getElementById('status').innerText = "ライブラリ読み込み失敗。ネット接続を確認してください。";
            } else {
                document.getElementById('status').innerText = "準備OK！学習ボタンを押せます。";
            }
        };

        let trainedModel = null;

        async function learn() {
            try {
                const status = document.getElementById('status');
                status.innerText = "学習中... (約1秒)";

                const model = tf.sequential();
                model.add(tf.layers.dense({units: 1, inputShape: [1]}));
                model.compile({loss: 'meanSquaredError', optimizer: 'sgd'});

                const xs = tf.tensor2d([1, 2, 3, 4], [4, 1]);
                const ys = tf.tensor2d([2, 4, 6, 8], [4, 1]);

                await model.fit(xs, ys, {epochs: 100});

                trainedModel = model;
                status.innerText = "学習完了！";
            } catch (e) {
                document.getElementById('status').innerText = "エラー発生: " + e.message;
                console.error(e);
            }
        }

        function predict() {
            if (!trainedModel) {
                alert("先に学習ボタンを押してね！");
                return;
            }
            const num = parseFloat(document.getElementById('userNumber').value);
            const prediction = trainedModel.predict(tf.tensor2d([num], [1, 1]));
            const resultVal = prediction.dataSync();

            document.getElementById('result').innerText = `AIの予測：${resultVal[0].toFixed(2)}`;
        }
    </script>
</body>
</html>
